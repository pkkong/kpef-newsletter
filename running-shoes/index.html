<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>러닝화 추천표 MVP</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__inner">
        <div>
          <p class="eyebrow">DC RUNNING GALLERY · 2026.05</p>
          <h1>러닝화 추천표</h1>
        </div>
        <a
          class="source-link"
          href="https://gall.dcinside.com/mgallery/board/view/?id=running&no=1042108&page=1"
          target="_blank"
          rel="noreferrer"
        >
          원문 보기
        </a>
      </div>
    </header>

    <main class="app-shell">
      <div id="homeView">
        <section class="control-panel" aria-label="러닝화 필터">
          <label class="search-field">
            <span>검색</span>
            <input id="searchInput" type="search" placeholder="모델명, 브랜드, 종류 검색" autocomplete="off" />
          </label>

          <div class="filter-block">
            <div class="filter-block__head">
              <h2>브랜드</h2>
              <button id="resetButton" class="icon-button" type="button" aria-label="필터 초기화" title="필터 초기화">
                ↺
              </button>
            </div>
            <div id="brandFilters" class="chip-row" role="group" aria-label="브랜드 필터"></div>
          </div>

          <div class="filter-grid">
            <div class="filter-block">
              <h2>대분류</h2>
              <div id="groupFilters" class="chip-row" role="group" aria-label="대분류 필터"></div>
            </div>
            <div class="filter-block">
              <h2>종류</h2>
              <div id="categoryFilters" class="chip-row" role="group" aria-label="종류 필터"></div>
            </div>
          </div>

          <div class="filter-block">
            <h2>추천 태그</h2>
            <div id="tagFilters" class="chip-row" role="group" aria-label="추천 태그 필터"></div>
          </div>
        </section>

        <section class="matrix-section" aria-label="한눈에 보기">
          <div class="section-head">
            <div>
              <p id="resultMeta" class="eyebrow">전체 러닝화</p>
              <h2>한눈에 보기</h2>
            </div>
            <select id="sortSelect" aria-label="목록 정렬">
              <option value="table">원문 표 순서</option>
              <option value="brand">브랜드순</option>
              <option value="category">종류순</option>
              <option value="drop">드롭 낮은순</option>
            </select>
          </div>
          <div id="overviewMatrix" class="matrix-scroll"></div>
        </section>

        <section class="results-head" aria-live="polite">
          <div>
            <p class="eyebrow">목록 보기</p>
            <h2 id="resultTitle">추천표 전체</h2>
          </div>
        </section>

        <section id="shoeGrid" class="shoe-grid" aria-label="러닝화 목록"></section>

        <section id="emptyState" class="empty-state" hidden>
          <h2>조건에 맞는 러닝화가 없습니다</h2>
          <p>검색어를 줄이거나 필터를 초기화해 보세요.</p>
        </section>
      </div>

      <section id="detailView" class="detail-view" aria-label="러닝화 상세" hidden></section>
    </main>

    <footer class="footer">
      <p>가격 조회, 최저가 검색, 알림은 다음 단계 기능으로 예약되어 있습니다.</p>
    </footer>

    <script src="data/shoes.js"></script>
    <script src="app.js"></script>
  </body>
</html>
